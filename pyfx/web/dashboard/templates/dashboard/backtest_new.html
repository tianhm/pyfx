{% extends "dashboard/base.html" %}
{% block title %}pyfx - New Backtest{% endblock %}

{% block content %}
<!-- Breadcrumbs -->
<div class="breadcrumbs text-sm mb-4">
    <ul>
        <li><a href="{% url 'dashboard:backtest_list' %}">Backtests</a></li>
        <li>New Backtest</li>
    </ul>
</div>

<h1 class="text-2xl font-bold mb-6">New Backtest</h1>

<form id="backtest-form" method="post" action="{% url 'dashboard:backtest_start' %}">
    {% csrf_token %}
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Left Column: Core Config -->
        <div class="space-y-4">
            <div class="card bg-base-100 shadow">
                <div class="card-body p-5 space-y-4">
                    <h2 class="text-sm font-semibold uppercase tracking-wider opacity-50">Configuration</h2>

                    <div class="form-control">
                        <label class="label py-1"><span class="label-text text-xs font-medium">Strategy</span></label>
                        <select id="strategy-select" name="strategy" class="select select-bordered select-sm w-full" required>
                            <option value="" disabled selected>Loading strategies&hellip;</option>
                        </select>
                    </div>

                    <div class="form-control">
                        <label class="label py-1"><span class="label-text text-xs font-medium">Instrument</span></label>
                        <input type="text" name="instrument" value="EUR/USD" class="input input-bordered input-sm w-full" required />
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="form-control">
                            <label class="label py-1"><span class="label-text text-xs font-medium">Start Date</span></label>
                            <input type="date" id="start-date" name="start" class="input input-bordered input-sm w-full" required />
                        </div>
                        <div class="form-control">
                            <label class="label py-1"><span class="label-text text-xs font-medium">End Date</span></label>
                            <input type="date" id="end-date" name="end" class="input input-bordered input-sm w-full" required />
                        </div>
                    </div>

                    <div class="form-control">
                        <label class="label py-1"><span class="label-text text-xs font-medium">Data File</span></label>
                        <select id="dataset-select" class="select select-bordered select-sm w-full" onchange="onDatasetSelect(this)">
                            <option value="" disabled selected>Loading datasets&hellip;</option>
                        </select>
                        <input type="hidden" name="data_file" id="data-file-input" required />
                        <input type="text" id="custom-path-input" placeholder="Enter custom file path" class="input input-bordered input-sm w-full font-mono text-xs mt-2 hidden" />
                        <label class="label py-0"><span class="label-text-alt opacity-40">Select a dataset or enter a custom path</span></label>
                    </div>
                </div>
            </div>

            <!-- Advanced Settings (Collapsible) -->
            <div class="collapse collapse-arrow bg-base-100 shadow rounded-box">
                <input type="checkbox" />
                <div class="collapse-title text-sm font-semibold uppercase tracking-wider opacity-50 py-3 min-h-0">
                    Advanced
                </div>
                <div class="collapse-content px-5 pb-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="form-control">
                            <label class="label py-1"><span class="label-text text-xs">Balance</span></label>
                            <input type="number" name="balance" value="100000" class="input input-bordered input-sm w-full" />
                        </div>
                        <div class="form-control">
                            <label class="label py-1"><span class="label-text text-xs">Leverage</span></label>
                            <input type="number" name="leverage" value="50" class="input input-bordered input-sm w-full" />
                        </div>
                        <div class="form-control">
                            <label class="label py-1"><span class="label-text text-xs">Trade Size</span></label>
                            <input type="number" name="trade_size" value="100000" class="input input-bordered input-sm w-full" />
                        </div>
                        <div class="form-control">
                            <label class="label py-1"><span class="label-text text-xs">Bar Type</span></label>
                            <input type="text" name="bar_type" value="1-MINUTE-LAST-EXTERNAL" class="input input-bordered input-sm w-full font-mono text-xs" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="submit-btn" class="btn btn-primary w-full">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-4 h-4" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
                Start Backtest
            </button>
        </div>

        <!-- Right Columns: Strategy Parameters -->
        <div id="strategy-params-area" class="lg:col-span-2 hidden">
            <div id="strategy-params-cards" class="space-y-4"></div>
        </div>
    </div>
</form>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const select = document.getElementById('strategy-select');
    const paramsArea = document.getElementById('strategy-params-area');
    const paramsCards = document.getElementById('strategy-params-cards');
    let strategiesData = {};

    // ── Set default dates (1 year ago → today) ──
    const today = new Date();
    const yearAgo = new Date(today);
    yearAgo.setFullYear(yearAgo.getFullYear() - 1);
    document.getElementById('end-date').value = today.toISOString().slice(0, 10);
    document.getElementById('start-date').value = yearAgo.toISOString().slice(0, 10);

    const CATEGORY_LABELS = {
        indicators: 'Indicators & Entry',
        exits: 'Exit Rules',
        timing: 'Session & Timing',
        advanced: 'Advanced',
    };
    const CATEGORY_ORDER = ['indicators', 'exits', 'timing', 'advanced'];

    const ENUM_OPTIONS = {
        entry_mode: ['full', 'relaxed', '2of3', 'no_h2', 'sma_macd', 'rsi_level', 'trend_follow'],
        exit_mode: ['fixed', 'trailing', 'atr'],
    };

    // ── Load datasets for data file dropdown ──
    const datasetSelect = document.getElementById('dataset-select');
    const dataFileInput = document.getElementById('data-file-input');
    const customPathInput = document.getElementById('custom-path-input');

    fetch('{% url "dashboard:api_datasets" %}')
        .then(r => r.json())
        .then(data => {
            datasetSelect.innerHTML = '<option value="" disabled selected>Select a dataset</option>';
            data.forEach(ds => {
                const opt = document.createElement('option');
                opt.value = ds.file_path;
                opt.textContent = ds.instrument + ' ' + ds.timeframe + ' (' + ds.start_date + ' to ' + ds.end_date + ') - ' + ds.display_size;
                datasetSelect.appendChild(opt);
            });
            const customOpt = document.createElement('option');
            customOpt.value = '__custom__';
            customOpt.textContent = 'Custom path\u2026';
            datasetSelect.appendChild(customOpt);

            if (data.length === 0) {
                datasetSelect.innerHTML = '<option value="__custom__" selected>No datasets - enter path manually</option>';
                customPathInput.classList.remove('hidden');
                customPathInput.required = true;
            }
        });

    window.onDatasetSelect = function(sel) {
        if (sel.value === '__custom__') {
            customPathInput.classList.remove('hidden');
            customPathInput.required = true;
            dataFileInput.value = '';
            customPathInput.addEventListener('input', function() {
                dataFileInput.value = this.value;
            });
        } else {
            customPathInput.classList.add('hidden');
            customPathInput.required = false;
            dataFileInput.value = sel.value;
        }
    };

    fetch('{% url "dashboard:api_strategies" %}')
        .then(r => r.json())
        .then(data => {
            select.innerHTML = '<option value="" disabled selected>Select a strategy</option>';
            data.forEach(s => {
                strategiesData[s.name] = s.params;
                const opt = document.createElement('option');
                opt.value = s.name;
                opt.textContent = s.name;
                select.appendChild(opt);
            });
        })
        .catch(() => {
            select.innerHTML = '<option value="" disabled selected>Failed to load strategies</option>';
        });

    select.addEventListener('change', function() {
        const params = strategiesData[this.value] || [];
        paramsCards.innerHTML = '';

        if (params.length === 0) {
            paramsArea.classList.add('hidden');
            return;
        }
        paramsArea.classList.remove('hidden');

        // Group by category
        const groups = {};
        params.forEach(p => {
            const cat = p.category || 'advanced';
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(p);
        });

        CATEGORY_ORDER.forEach(cat => {
            const items = groups[cat];
            if (!items || items.length === 0) return;

            const card = document.createElement('div');
            card.className = 'card bg-base-100 shadow';
            const body = document.createElement('div');
            body.className = 'card-body p-5';

            const heading = document.createElement('h2');
            heading.className = 'text-sm font-semibold uppercase tracking-wider opacity-50 mb-3';
            heading.textContent = CATEGORY_LABELS[cat] || cat;
            body.appendChild(heading);

            const grid = document.createElement('div');
            grid.className = 'grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-2';

            items.forEach(p => {
                const wrapper = document.createElement('div');
                wrapper.className = 'form-control';

                if (p.type === 'bool') {
                    // Toggle
                    wrapper.className = 'form-control flex-row items-center justify-between py-2';
                    const label = document.createElement('span');
                    label.className = 'label-text text-xs';
                    label.textContent = p.name;
                    wrapper.appendChild(label);

                    // Hidden input for unchecked state
                    const hidden = document.createElement('input');
                    hidden.type = 'hidden';
                    hidden.name = 'param_' + p.name;
                    hidden.value = 'false';
                    wrapper.appendChild(hidden);

                    const toggle = document.createElement('input');
                    toggle.type = 'checkbox';
                    toggle.className = 'toggle toggle-sm toggle-primary';
                    toggle.dataset.paramName = p.name;
                    if (p.default === true) toggle.checked = true;
                    toggle.addEventListener('change', function() {
                        hidden.value = this.checked ? 'true' : 'false';
                    });
                    if (p.default === true) hidden.value = 'true';
                    wrapper.appendChild(toggle);
                } else if (ENUM_OPTIONS[p.name]) {
                    // Select dropdown
                    const label = document.createElement('label');
                    label.className = 'label py-1';
                    label.innerHTML = '<span class="label-text text-xs">' + p.name + '</span>';
                    wrapper.appendChild(label);

                    const sel = document.createElement('select');
                    sel.name = 'param_' + p.name;
                    sel.className = 'select select-bordered select-sm w-full';
                    ENUM_OPTIONS[p.name].forEach(opt => {
                        const o = document.createElement('option');
                        o.value = opt;
                        o.textContent = opt;
                        if (opt === p.default) o.selected = true;
                        sel.appendChild(o);
                    });
                    wrapper.appendChild(sel);
                } else {
                    // Number or text input
                    const label = document.createElement('label');
                    label.className = 'label py-1';
                    label.innerHTML = '<span class="label-text text-xs">' + p.name + '</span>';
                    wrapper.appendChild(label);

                    const input = document.createElement('input');
                    input.type = (p.type === 'int' || p.type === 'float') ? 'number' : 'text';
                    input.name = 'param_' + p.name;
                    input.value = p.default !== null ? p.default : '';
                    if (p.type === 'float') input.step = 'any';
                    input.className = 'input input-bordered input-sm w-full';
                    wrapper.appendChild(input);
                }

                grid.appendChild(wrapper);
            });

            body.appendChild(grid);
            card.appendChild(body);
            paramsCards.appendChild(card);
        });
    });

    // Form submit loading state
    document.getElementById('backtest-form').addEventListener('submit', function() {
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading loading-spinner loading-sm"></span> Starting&hellip;';
    });
});
</script>
{% endblock %}
