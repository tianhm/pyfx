<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}pyfx{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        .sidebar-link { transition: all 0.15s ease; }
        .sidebar-link:hover { background: rgba(255,255,255,0.06); }
        .sidebar-link.active { background: rgba(99, 102, 241, 0.15); color: #818cf8; border-right: 3px solid #818cf8; }
        .sidebar-link.active svg { color: #818cf8; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen bg-base-200">
    <div class="drawer lg:drawer-open">
        <input id="sidebar-toggle" type="checkbox" class="drawer-toggle" />

        <!-- Main content -->
        <div class="drawer-content flex flex-col">
            <!-- Top bar (mobile) -->
            <div class="navbar bg-base-100 border-b border-base-300 lg:hidden">
                <div class="flex-none">
                    <label for="sidebar-toggle" class="btn btn-square btn-ghost">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </label>
                </div>
                <div class="flex-1">
                    <span class="text-lg font-bold tracking-tight">pyfx</span>
                </div>
            </div>

            <!-- Page content -->
            <main class="flex-1 p-6 lg:p-8 max-w-7xl w-full mx-auto">
                {% block content %}{% endblock %}
            </main>
        </div>

        <!-- Sidebar -->
        <div class="drawer-side z-40">
            <label for="sidebar-toggle" aria-label="close sidebar" class="drawer-overlay"></label>
            <aside class="w-64 min-h-screen bg-base-100 border-r border-base-300 flex flex-col">
                <!-- Brand -->
                <div class="px-6 py-5 border-b border-base-300">
                    <a href="{% url 'dashboard:overview' %}" class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-4 h-4 text-indigo-400" stroke-width="2">
                                <path d="M3 3v18h18" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M7 16l4-8 4 4 4-8" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div>
                            <span class="text-lg font-bold tracking-tight">pyfx</span>
                            <span class="text-xs text-base-content/40 block -mt-0.5">Trading Lab</span>
                        </div>
                    </a>
                </div>

                <!-- Navigation -->
                <nav class="flex-1 px-3 py-4">
                    <ul class="space-y-1">
                        <li>
                            <a href="{% url 'dashboard:overview' %}"
                               class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if active_nav == 'overview' %}active{% else %}text-base-content/70{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-5 h-5 opacity-70" stroke-width="1.5">
                                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                                </svg>
                                Overview
                            </a>
                        </li>
                        <li>
                            <a href="{% url 'dashboard:dataset_list' %}"
                               class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if active_nav == 'data' %}active{% else %}text-base-content/70{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-5 h-5 opacity-70" stroke-width="1.5">
                                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                                </svg>
                                Data
                            </a>
                        </li>
                        <li>
                            <a href="{% url 'dashboard:backtest_list' %}"
                               class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium {% if active_nav == 'backtests' %}active{% else %}text-base-content/70{% endif %}">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-5 h-5 opacity-70" stroke-width="1.5">
                                    <path d="M9 19v-6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2zm0 0V9a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v10m-6 0a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2m0 0V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                                Backtests
                            </a>
                        </li>
                    </ul>
                </nav>

                <!-- Footer -->
                <div class="px-4 py-3 border-t border-base-300">
                    <div class="text-xs text-base-content/30 text-center">
                        pyfx &middot; NautilusTrader
                    </div>
                </div>
            </aside>
        </div>
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
